version: "3.9"

services:
  db:
    image: postgres:13.2-alpine
    restart: always
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
volumes:
  postgres-db-data:

